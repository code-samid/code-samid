<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="weave" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <rect width="12" height="12" fill="none"/>
      <path d="M0 12 L12 0" stroke="#5c1f1c" stroke-opacity="0.35" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Flat Falu red field, no gradient -->
  <rect width="1200" height="300" fill="#7A2E28"/>

  <!-- Subtle wood-grain texture, bottom third only -->
  <rect x="0" y="230" width="1200" height="70" fill="url(#weave)"/>
  <line x1="0" y1="230" x2="1200" y2="230" stroke="#5c1f1c" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Pine treeline silhouette, far right, quiet -->
  <g fill="#5c1f1c" fill-opacity="0.55">
    <path d="M1030 230 L1030 172 L1016 192 L1027 192 L1006 218 L1020 218 L995 230 Z"/>
    <path d="M1080 230 L1080 148 L1062 176 L1076 176 L1049 210 L1067 210 L1035 230 Z"/>
    <path d="M1135 230 L1135 182 L1120 202 L1132 202 L1109 226 L1124 226 L1098 230 Z"/>
  </g>

  <!-- Warm cream window-frame rule, top -->
  <rect x="90" y="72" width="70" height="4" fill="#f0e6d2"/>

  <!-- Name -->
  <text x="90" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f5ead6" font-weight="600" letter-spacing="0.5">
    Samid Ahmed
  </text>

  <!-- Role -->
  <text x="92" y="184" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8c07a" letter-spacing="2.5">
    FULL-STACK WEB DEVELOPER &#183; MERN
  </text>

  <!-- Tagline -->
  <text x="92" y="212" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#e3c9b8" letter-spacing="0.4">
    Mechanical Engineer turned Developer &#160;&#183;&#160; Kuopio, Finland
  </text>
</svg>
